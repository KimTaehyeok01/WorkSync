name: Deploy to EC2

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build with Gradle
        run: |
          cd backend
          chmod +x gradlew
          ./gradlew build -x test

      - name: Copy JAR to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          source: "backend/build/libs/worksync-0.0.1-SNAPSHOT.jar"
          target: "/home/ubuntu/WorkSync/"

      - name: Restart Backend & Frontend
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          command_timeout: 5m
          script: |
            sudo fuser -k 8080/tcp || true
            nohup env \
              DB_URL="${{ secrets.DB_URL }}" \
              DB_USERNAME="${{ secrets.DB_USERNAME }}" \
              DB_PASSWORD="${{ secrets.DB_PASSWORD }}" \
              JWT_SECRET="${{ secrets.JWT_SECRET }}" \
              SUPABASE_URL="${{ secrets.SUPABASE_URL }}" \
              SUPABASE_SERVICE_ROLE_KEY="${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
              FRONTEND_URL="https://worksync.kr" \
              CORS_ALLOWED_ORIGINS="https://worksync.kr" \
              java -jar /home/ubuntu/WorkSync/backend/build/libs/worksync-0.0.1-SNAPSHOT.jar \
              > /home/ubuntu/backend.log 2>&1 &

            sudo fuser -k 3000/tcp || true
            cd /home/ubuntu/WorkSync/frontend
            nohup npm run dev -- --host > /home/ubuntu/frontend.log 2>&1 &
